name: Generate Snake
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Sam-Dev-161127
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#00ffff&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#00ffff&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          keep_history: true
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
